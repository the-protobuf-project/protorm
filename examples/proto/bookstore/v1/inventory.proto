syntax = "proto3";

// inventory.proto demonstrates the multi-file datasource merge: it declares
// the same datasource name as bookstore.proto, so its tables land in the same
// bookstore_db tree — under the "inventory" schema via the schema override.
package bookstore.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "protorm/v1/annotations.proto";

option java_multiple_files = true;
option java_outer_classname = "InventoryProto";
option java_package = "com.bookstore.v1";
option (protorm.v1.datasource) = {
  database: "bookstore_db"
  schema: "inventory" // override: tables here land in the inventory schema
};

// Shelf groups books physically. The resource's `plural` fixes the irregular
// plural ("shelfs" → "shelves") — no table name override needed.
message Shelf {
  option (google.api.resource) = {
    type: "bookstore.v1/Shelf"
    pattern: "shelves/{shelf}"
    singular: "shelf"
    plural: "shelves"
  };
  option (protorm.v1.table) = {timestamps: true};

  // name: IDENTIFIER → PRIMARY KEY, VARCHAR(255).
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // theme: REQUIRED → NOT NULL VARCHAR(255).
  string theme = 2 [(google.api.field_behavior) = REQUIRED];

  // capacity is the number of books the shelf holds; nullable INTEGER.
  int32 capacity = 3;
}
