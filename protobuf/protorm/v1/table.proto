syntax = "proto3";

package protorm.v1;

option go_package = "github.com/the-protobuf-project/protorm/protorm/protormpbv1;protormpbv1";
option java_multiple_files = true;
option java_outer_classname = "TableProto";
option java_package = "com.protorm.v1";

// IndexDef describes one multi-column index on a table.
// Single-column indexes are expressed more concisely via ColOptions.index.
message IndexDef {
  // columns lists field names (proto snake_case) participating in the index.
  repeated string columns = 1;

  // unique makes this a UNIQUE index.
  bool unique = 2;

  // index is an optional explicit index name.
  // Auto-generated as idx_<table>_<cols> when empty.
  string index = 3;
}

// TableOptions overrides table-level generation for a message.
//
// Applied via:
//
//	option (protorm.v1.table) = {
//	  table: "shelves"
//	  id: ID_STRATEGY_ULID
//	  timestamps: true
//	};
message TableOptions {
  // table is an explicit table name.
  // Defaults to snake_case plural of the google.api.resource.type suffix.
  string table = 1;

  // skip excludes this message from all output — no table is generated.
  bool skip = 2;

  // indexes declares additional multi-column indexes beyond those inferred
  // from AIP annotations (e.g. composite unique constraints).
  repeated IndexDef indexes = 3;

  // id synthesizes a generated primary key column (ULID or UUID) and demotes
  // the IDENTIFIER field to a UNIQUE constraint.
  IdStrategy id = 4;

  // timestamps appends created_at / updated_at TIMESTAMPTZ columns:
  // created_at DEFAULT now(); updated_at maintained on write
  // (Prisma @updatedAt, GORM autoUpdateTime).
  bool timestamps = 5;
}

// IdStrategy selects how the primary key column is generated for a table.
// When set (not UNSPECIFIED), protorm synthesizes an `id` column as the PK and
// demotes any IDENTIFIER field to UNIQUE NOT NULL — matching the production
// pattern where AIP resource names are lookup keys, not storage keys.
enum IdStrategy {
  // No synthesized key: the IDENTIFIER field stays the primary key.
  ID_STRATEGY_UNSPECIFIED = 0;

  // ULID primary key: CHAR(26), Prisma @default(ulid()), app-generated in SQL.
  ID_STRATEGY_ULID = 1;

  // UUID primary key: native UUID type, DEFAULT gen_random_uuid() in DDL,
  // Prisma @default(uuid()).
  ID_STRATEGY_UUID = 2;
}
