syntax = "proto3";

package protorm.v1;

// go_package places the generated stubs at protorm/protormpbv1/ in the module
// root so consumers import github.com/oh-tarnished/protorm/protorm/protormpbv1.
option go_package = "github.com/oh-tarnished/protorm/protorm/protormpbv1;protormpbv1";
option java_multiple_files = true;
option java_outer_classname = "DatasourceProto";
option java_package = "com.protorm.v1";

// DatasourceOptions configures database-level output for a .proto file.
// Files that share the same datasource name are merged into one database,
// so a multi-file proto package maps to a single generated schema tree.
//
// Applied via:
//
//	option (protorm.v1.datasource) = {
//	  database: "bookstore_db"
//	  schema: "bookstore"
//	  provider: "postgres"
//	  url: "postgresql://localhost:5432/bookstore_db"
//	};
message DatasourceOptions {
  // database is the explicit database identifier.
  // Defaults to the last segment of the proto package name.
  string database = 1;

  // schema overrides the schema namespace for every table in this file.
  // When unset, the schema is inferred from the google.api.resource.type prefix
  // ("bookstore.v1/Book" → "bookstore_v1").
  string schema = 2;

  // url is the database connection URL documented in generated config and DDL
  // headers. Prisma 7 output reads the URL from <db>.config.ts via env().
  string url = 3;

  // provider selects the database backend type system.
  // Accepted values: "postgres" (default), "mongodb".
  // Drives type mapping and the generated fragment extension
  // (<domain>.postgres.prisma vs <domain>.mongodb.prisma).
  string provider = 4;
}
