syntax = "proto3";

package protorm.v1;

option go_package = "github.com/the-protobuf-project/protorm/protorm/protormpbv1;protormpbv1";
option java_multiple_files = true;
option java_outer_classname = "ColumnProto";
option java_package = "com.protorm.v1";

// ColOptions overrides column-level generation for a single field.
//
// Applied via:
//
//	string title = 2 [(protorm.v1.col) = { max_length: 500 }];
message ColOptions {
  // column is an explicit column name.
  // Defaults to the proto field name, which is already snake_case.
  string column = 1;

  // type is an explicit database type, e.g. "VARCHAR(255)", "JSONB", "TIMESTAMPTZ".
  // Provider-specific escape hatch; prefer max_length / precision for
  // provider-neutral sizing. Overrides all inference.
  string type = 2;

  // default_value is a SQL default expression, e.g. "NOW()", "'active'", "0".
  // Written verbatim into the DEFAULT clause.
  string default_value = 3;

  // unique adds a UNIQUE constraint to this column.
  bool unique = 4;

  // index adds a single-column index on this column.
  // Use TableOptions.indexes for composite indexes.
  bool index = 5;

  // skip excludes this field from all output — no column is generated.
  bool skip = 6;

  // max_length caps a string field: VARCHAR(max_length) instead of the
  // VARCHAR(255) default. Provider-neutral (Mongo ignores it).
  int32 max_length = 7;

  // precision sizes the integral digit count of a numeric field:
  // NUMERIC(precision, scale). Applies to double/float fields.
  int32 precision = 8;

  // scale sizes the fractional digit count of a numeric field.
  // Defaults to 0 when only precision is set.
  int32 scale = 9;

  // on_delete sets the FK ON DELETE referential action for a field carrying
  // google.api.resource_reference. Ignored on non-reference fields.
  ReferentialAction on_delete = 10;

  // on_update sets the FK ON UPDATE referential action for a field carrying
  // google.api.resource_reference. Ignored on non-reference fields.
  ReferentialAction on_update = 11;

  // Field 12 was `StorageMode storage`, which let a message-typed field be
  // inlined as a single JSONB column. Removed: every user-defined nested message
  // is always relationalized into a child table with a primary key + foreign
  // key, so the nested structure is never flattened into an opaque JSON blob.
  // (Maps and google.* well-known types still map to JSONB — they cannot become
  // tables.) Reserved so the number/name are never reused.
  reserved 12;
  reserved "storage";
}

// ReferentialAction is the ON DELETE / ON UPDATE behavior of a foreign key
// inferred from google.api.resource_reference.
enum ReferentialAction {
  // Database default behavior (NO ACTION in PostgreSQL).
  REFERENTIAL_ACTION_UNSPECIFIED = 0;

  // Delete/update child rows when the parent row is deleted/updated.
  REFERENTIAL_ACTION_CASCADE = 1;

  // Reject the parent delete/update while child rows exist.
  REFERENTIAL_ACTION_RESTRICT = 2;

  // Null the FK column when the parent row is deleted/updated.
  REFERENTIAL_ACTION_SET_NULL = 3;

  // Reset the FK column to its default value.
  REFERENTIAL_ACTION_SET_DEFAULT = 4;

  // Explicit NO ACTION.
  REFERENTIAL_ACTION_NO_ACTION = 5;
}
