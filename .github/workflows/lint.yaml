name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Lint (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  proto:
    name: Lint (Proto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: buf build
        run: buf build
      - name: buf lint
        run: buf lint
      - name: Generated stubs up to date
        run: |
          buf generate
          git diff --exit-code -- plugin/pb/ \
            || (echo "::error::plugin/pb/ stubs are stale — run 'buf generate' and commit" && exit 1)
