syntax = "proto3";

package shop.cart.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";

option go_package = "example.com/test/gen;collisionv1";

// Money is a cart-side resource. Its simple name "Money" collides with the
// order-side Money once both packages merge into the "commerce" database (see
// protorm.yaml). Prisma qualifies the colliding model names (its models share
// one global namespace), while the schema-namespaced targets — GORM (one package
// per schema), SQL, and CSV — keep the bare "Money", since the schema already
// disambiguates them.
message Money {
  option (google.api.resource) = {
    type: "shop.cart.v1/Money"
    pattern: "money/{money}"
    singular: "money"
    plural: "moneys"
  };

  // Resource name; the AIP identifier.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Amount in minor units.
  int64 amount = 2 [(google.api.field_behavior) = REQUIRED];

  // Status is a cart-side enum whose simple name collides with order.Status.
  Status status = 3 [(google.api.field_behavior) = REQUIRED];
}

// Status enumerates cart payment states.
enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_PENDING = 1;
  STATUS_PAID = 2;
}
