syntax = "proto3";

// Package external.v1 exercises relationalization of an imported, non-generated
// message. A value type like google.type.Money — imported from another module
// and never listed in file_to_generate — becomes its own child table (a
// synthesized primary key + the foreign key linking it to its owner) instead of
// collapsing into an opaque JSONB column.
package external.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "money.proto";
import "protorm/v1/annotations.proto";

option go_package = "example.com/test/gen;externalv1";
option java_multiple_files = true;
option java_outer_classname = "ExternalProto";
option java_package = "com.example.external.v1";

option (protorm.v1.datasource) = {database: "external_db"};

// Product owns a price expressed as an imported Money value type.
message Product {
  option (google.api.resource) = {
    type: "external.v1/Product"
    pattern: "products/{product}"
    singular: "product"
    plural: "products"
  };

  // Resource name; the AIP identifier.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Human-readable product title.
  string title = 2 [(google.api.field_behavior) = REQUIRED];

  // Required imported value type → belongs-to: Product holds price_id, and the
  // external Money message is materialized as its own table rather than JSONB.
  ext.type.v1.Money price = 3 [(google.api.field_behavior) = REQUIRED];
}
