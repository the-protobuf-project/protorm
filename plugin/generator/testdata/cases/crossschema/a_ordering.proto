syntax = "proto3";

// Package shop.v1, ordering schema: defines the shared Money value object and an
// Order resource that embeds it. Because this file is processed first, Money is
// materialized in the ordering schema, so the promo schema's reference to it
// (b_promo.proto) is a cross-schema value-object reference.
package shop.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "protorm/v1/annotations.proto";

option (protorm.v1.datasource) = {
  database: "shop_db"
  schema: "ordering"
};

// Money is a shared value object, relationalized into ordering.moneys.
message Money {
  // currency_code is the ISO 4217 code.
  string currency_code = 1 [(google.api.field_behavior) = REQUIRED];

  // units is the whole-currency amount.
  int64 units = 2;
}

// Order is a resource in the ordering schema; it embeds Money as its total.
message Order {
  option (google.api.resource) = {
    type: "shop.v1/Order"
    pattern: "orders/{order}"
    singular: "order"
    plural: "orders"
  };

  // name: AIP resource name → UNIQUE lookup column (id is the synthesized PK).
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // total embeds the shared Money value object (same-schema belongs-to).
  Money total = 2 [(google.api.field_behavior) = REQUIRED];
}
